<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="techGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#techGradient1)"/>
  
  <!-- Code blocks -->
  <rect x="100" y="100" width="200" height="120" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="120" y="125" fill="white" font-family="monospace" font-size="12">
    <tspan x="120" dy="0">function createApp() {</tspan>
    <tspan x="140" dy="20">  return ReactDOM.render(</tspan>
    <tspan x="160" dy="20">    &lt;App /&gt;,</tspan>
    <tspan x="160" dy="20">    document.getElementById('root')</tspan>
    <tspan x="120" dy="20">  );</tspan>
    <tspan x="120" dy="20">}</tspan>
  </text>
  
  <!-- Floating icons -->
  <g transform="translate(500, 150)">
    <!-- React logo -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#61dafb" stroke-width="3" opacity="0.8"/>
    <circle cx="0" cy="0" r="15" fill="#61dafb" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="none" stroke="#61dafb" stroke-width="3" opacity="0.8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="40" ry="15" fill="none" stroke="#61dafb" stroke-width="3" opacity="0.8" transform="rotate(120)"/>
  </g>
  
  <!-- Node.js icon -->
  <g transform="translate(600, 300)">
    <circle cx="0" cy="0" r="35" fill="#68a063" opacity="0.8"/>
    <path d="M -20 -20 L 20 -20 L 20 20 L -20 20 Z" fill="white" opacity="0.9"/>
    <path d="M -15 -15 L 15 -15 L 15 15 L -15 15 Z" fill="#68a063"/>
  </g>
  
  <!-- Database icon -->
  <g transform="translate(150, 400)">
    <ellipse cx="0" cy="0" rx="50" ry="15" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <rect x="-40" y="-15" width="80" height="60" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <ellipse cx="0" cy="45" rx="50" ry="15" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="-30" y1="20" x2="30" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="-30" y1="40" x2="30" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  </g>
  
  <!-- Floating particles -->
  <circle cx="200" cy="200" r="2" fill="rgba(255,255,255,0.8)" filter="url(#glow)"/>
  <circle cx="400" cy="100" r="3" fill="rgba(255,255,255,0.6)" filter="url(#glow)"/>
  <circle cx="600" cy="150" r="2" fill="rgba(255,255,255,0.7)" filter="url(#glow)"/>
  <circle cx="300" cy="350" r="2" fill="rgba(255,255,255,0.5)" filter="url(#glow)"/>
  <circle cx="500" cy="450" r="3" fill="rgba(255,255,255,0.6)" filter="url(#glow)"/>
  
  <!-- Connection lines -->
  <line x1="300" y1="160" x2="500" y2="150" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="500" y1="190" x2="600" y2="300" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="200" y1="400" x2="150" y2="400" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="5,5"/>
</svg>
